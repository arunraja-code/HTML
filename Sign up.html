    @import url('https://fonts.googleapis.com/css2?family=Mea+Culpa&display=swap');

<!DOCTYPE html>
<html lang="en">
<body style="background-color:rgb(245,226,227);"></body>
<head>
<meta charset="UTF-8">
<meta http-equiv=""C-UA-Compatible" content=""IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<style>
    h1{
       font-family: "Mea Culpa", cursive;
        }
    p{
        text-align: center; color: rgba(51, 13, 27, 0.856); 
        }
</style>
</head>  
 <body>
    <div class="wrapper">
        <h1 style="color:rgb(213, 123, 129); font-size: 60px;">Handmade With Love</h1>
        <form>
            <div>
                <label for="firstname">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="rgb(51, 13, 27, 0.856)"><path d="M367-527q-47-47-47-113t47-113q47-47 113-47t113 47q47 47 47 113t-47 113q-47 47-113 47t-113-47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Z"/></svg>
                </label>
                <input required type="text"; name="firstname"; id=" firstname-input "; placeholder="Firstname"; >
            </div>
            <div>
                <label for="email-input">
                    <span>@</span>
                </label>
                <input required type="email"; name="email"; id=" email-input "; placeholder="Email"; >
            </div>
            <div>
                <label for="password-input">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="rgb(51, 13, 27, 0.856)"><path d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm296.5-223.5Q560-327 560-360t-23.5-56.5Q513-440 480-440t-56.5 23.5Q400-393 400-360t23.5 56.5Q447-280 480-280t56.5-23.5ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80Z"/></svg>
                </label>
                <input required type="password"; name="password"; id=" password-input "; placeholder="Password"; >
            </div>
            <div>
                <input type="password"; name="repeat-password"; id=" repeat-password-input "; placeholder="Repeat Password"; >
            </div>
            <button type='submit'> Sign Up </button>
        </form>
    </div>
 </body>
